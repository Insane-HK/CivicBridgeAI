AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CivicBridge AI — Frontend EC2 Deployment
  Provisions an EC2 instance with Nginx to serve the compiled Vite React frontend separately structure.

Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues: [t2.micro, t3.micro, t2.small, t3.small]
    Description: EC2 instance type for the frontend web server (t2.micro is free-tier eligible).
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance.

Resources:
  FrontendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH traffic to the frontend
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  FrontendInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroups: 
        - !Ref FrontendSecurityGroup
      # Amazon Linux 2023 AMI (us-east-1 as default example; update for your specific region if needed)
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}"
      Tags:
        - Key: Name
          Value: CivicBridge-Frontend-Server
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Update packages and install Nginx
          yum update -y
          yum install -y nginx

          # Start and enable Nginx service
          systemctl start nginx
          systemctl enable nginx

          # Set permissions so we can easily copy our built react files via SSH
          usermod -a -G nginx ec2-user
          chown -R ec2-user:nginx /usr/share/nginx/html
          chmod -R 2775 /usr/share/nginx/html

          # Configure Nginx for a single-page app (React Router fallback)
          cat << 'EOF' > /etc/nginx/conf.d/react.conf
          server {
              listen 80;
              server_name localhost;
              root /usr/share/nginx/html;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }
          }
          EOF

          # Restart Nginx to pick up the new configuration
          systemctl restart nginx

Outputs:
  FrontendURL:
    Description: "Public URL for the CivicBridge AI Frontend"
    Value: !Sub "http://${FrontendInstance.PublicDnsName}"
  InstancePublicIP:
    Description: "Public IP Address of the Frontend EC2 Instance"
    Value: !GetAtt FrontendInstance.PublicIp
